<!DOCTYPE html>
<html lang="en">

<head>
    <style>
        .titulo {
            color:aqua;
            font-size: 100px;
            text-align: center;
        }

        .menu {
            display: inline;
            color: rgb(255, 255, 255);
            background-color: rgb(0, 255, 13);
            width: 1000px;
            height: 1000px;  
        }
        .menu_block { 
            display: block;
            color:blue;
            background-color: aqua; 
            width: 400px;
            height: 200px;
            border: 1px solid rgb(196, 255, 211)
        }
    </style>
</head>
<body>
    <h1 class="titulo">Elementos inline</h1>
    <div class="menu">Productos</div>
    <div class="menu">Servicios</div>
    <div class="menu">Contacto</div>
    <hr /> 
<h1>Elementos block</h1>
    <div class="menu_block">Productos</div>
    <div class="menu_block">Servicios</div>
    <div class="menu_block">Contacto</div>
</body>
</html>
